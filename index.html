<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLS TRACKING</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
padding: 20px; 
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#222 1px,transparent 1px);
background-size:50px 50px;
opacity:0.2;
animation:move 15s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-50px,-50px);}
}

.lightning{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(transparent,rgba(255,255,255,.1),transparent);
animation:flash 6s infinite;
pointer-events:none;
}

@keyframes flash{
0%,95%,100%{
opacity:0;
}
96%{
opacity:.5;
}
97%{
opacity:1;
}
98%{
opacity:.2;
}
}

.container{
position:relative;
z-index:2;
text-align:center;
width: 100%;
max-width: 800px; 
}

.logo{
font-size: 7.5vw;
font-weight:900;
color:white;
text-shadow:
0 0 15px #fff,
0 0 30px #fff,
0 0 60px #fff;
animation:glow 2s infinite alternate;
}

.subtitle{
font-size: 3.5vw;
margin-bottom: 5vh; 
letter-spacing:8px;
text-shadow:
0 0 10px #fff,
0 0 20px #fff;
}

@keyframes glow{
from{
filter:brightness(1);
}
to{
filter:brightness(1.5);
}
}

.discord-btn{
display:inline-block;
padding: 18px 45px;
font-size: 1.25rem;
font-weight:bold;
color:white;
text-decoration:none;
border:2px solid white;
border-radius:20px;
box-shadow:
0 0 20px white,
0 0 50px white;
transition:.4s;
max-width: 100%; 
}

.discord-btn:hover{
background:white;
color:black;
transform:scale(1.05);
box-shadow:
0 0 40px white,
0 0 100px white;
}

.footer{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:.4;
letter-spacing:3px;
width: 100%;
text-align: center;
}
  
@media (max-width: 768px) {
  .logo {
    font-size: 55px; 
  }

  .subtitle {
    font-size: 24px; 
    margin-bottom: 40px;
    letter-spacing: 4px;
  }

  .discord-btn {
    padding: 15px 30px; 
    font-size: 15px;    
    border-radius: 15px;
    box-shadow: 0 0 15px white, 0 0 30px white; 
  }
  
  .footer {
    font-size: 10px;
    letter-spacing: 2px;
    bottom: 15px;
  }
}

</style>
</head>
<body>

<div class="lightning"></div>

<div class="container">

<div class="logo">.TLS.</div>

<div class="subtitle">.TRACKING.</div>

<a class="discord-btn"
href="https://discord.gg/kbFyS4U7"
target="_blank">
⚡ REJOINDRE LE DISCORD ⚡
</a>

</div>

<div class="footer">
TLS TRACKING © 2026
</div>

</body>
</html>
